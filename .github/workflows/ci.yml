name: GuardScope CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    # Pin to ubuntu-22.04 explicitly. The 'ubuntu-latest' tag is currently
    # ubuntu-24.04 and we observed intermittent pytest failures there that
    # do not reproduce locally; fixing the runner image keeps CI deterministic.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Test backend
        run: python -m pytest -q --maxfail=3 --tb=short
      - name: Upload pytest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs
          path: |
            .pytest_cache/
            **/*.log
          if-no-files-found: ignore

  frontend:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Static smoke
        run: npm run smoke
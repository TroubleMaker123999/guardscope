services:
  dvwa:
    image: vulnerables/web-dvwa:latest
    ports:
      - "127.0.0.1:8081:80"
    environment:
      # DVWA defaults to "impossible"; force "low" so we have something to find.
      SECURITY: "low"
      # Don't show the setup nag.
      RECAPTCHA_PRIV_KEY: ""
      RECAPTCHA_PUB_KEY: ""
      RECAPTCHA_ENABLED: "false"
    # No ``read_only: true`` — DVWA runs MariaDB underneath and writes its
    # database to /var/lib/mysql; it also expects Apache to write log files.
    # Acceptable on a loopback-only sandbox target.
    restart: unless-stopped

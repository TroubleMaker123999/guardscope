services:
  juice-shop:
    image: bkimminich/juice-shop:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      JUICE_SHOP_TELEMETRY: "false"
    read_only: true
    tmpfs:
      - /tmp:size=64M
    restart: unless-stopped

  dvwa:
    image: vulnerables/web-dvwa:latest
    ports:
      - "127.0.0.1:8081:80"
    environment:
      SECURITY: "low"
      RECAPTCHA_ENABLED: "false"
    read_only: true
    tmpfs:
      - /tmp:size=32M
    restart: unless-stopped
